<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <!-- Concept 2: Double Arrow - two nozzle shapes facing outward from center -->

  <!-- Left nozzle/arrow -->
  <path d="M 90,60 L 55,40 L 55,52 L 30,52 L 30,68 L 55,68 L 55,80 Z"
        fill="#7C3AED" opacity="0.9"/>

  <!-- Right nozzle/arrow -->
  <path d="M 90,60 L 125,40 L 125,52 L 150,52 L 150,68 L 125,68 L 125,80 Z"
        fill="#06B6D4" opacity="0.9"/>

  <!-- Center diamond (where nozzles meet) -->
  <circle cx="90" cy="60" r="5" fill="#4C1D95"/>

  <!-- Text -->
  <text x="175" y="65" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="52" letter-spacing="4" fill="#7C3AED">HYDRA</text>
  <text x="179" y="85" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="13" letter-spacing="5" fill="#9CA3AF">FOR KLIPPER</text>
  <text x="179" y="103" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="9" letter-spacing="2" fill="#6B7280" opacity="0.7">IDEX TOOLCHANGE MANAGEMENT</text>
</svg>
