# Hydra for Klipper - Nozzle Wipe System
#
# Sequence: prime retracted amount → purge → small retract → cool → snap wipe
# Called between _HYDRA_ACTIVATE and _HYDRA_POSITION during toolchange.
#
# Configure wipe parameters in hydra_variables.cfg.
# Set wipe_enabled to True and adjust wipe_x to match your wiper position.


[gcode_macro NOZZLE_WIPE]
description: Prime, purge, cool, and snap against wiper wall
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}

    # Skip if disabled
    {% if not cfg.wipe_enabled %}
        RESPOND MSG="Hydra: Nozzle wipe disabled"

    {% else %}
        # Skip if nozzle is cold (no target or below min temp)
        {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
        {% set nozzle_temp = printer[printer.toolhead.extruder].temperature|float %}

        {% if nozzle_target < cfg.min_toolchange_temp %}
            RESPOND MSG="Hydra: Skipping wipe - nozzle cold"

        {% else %}
            # Wait for nozzle to reach extrusion temp
            {% if nozzle_temp < cfg.min_toolchange_temp %}
                RESPOND MSG="Hydra: Waiting for temp before wipe..."
                {% if current_tool == 0 %}
                    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={cfg.min_toolchange_temp}
                {% else %}
                    TEMPERATURE_WAIT SENSOR="extruder1" MINIMUM={cfg.min_toolchange_temp}
                {% endif %}
            {% endif %}

            # Get retract depth for this tool
            {% if current_tool == 0 %}
                {% set retract_depth = cfg.t0_retract_depth %}
            {% else %}
                {% set retract_depth = cfg.t1_retract_depth %}
            {% endif %}

            {% set fan_pin = cfg.fan_pin_t0 if current_tool == 0 else cfg.fan_pin_t1 %}
            {% set old_accel = printer.toolhead.max_accel %}

            # 1. Move to purge position
            G90
            G1 X{cfg.wipe_x} F{cfg.travel_speed * 60}

            M83

            # 2. Prime: push back the retracted filament amount
            {% if retract_depth > 0 %}
                G1 E{retract_depth} F{cfg.prime_speed * 60}
                SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE=0
            {% endif %}

            # 3. Purge: extrude extra to flush old material
            G1 E{cfg.wipe_purge_length} F{cfg.wipe_purge_speed * 60}

            # 4. Small retract for clean tip break
            {% if cfg.wipe_retract > 0 %}
                G1 E-{cfg.wipe_retract} F{cfg.retract_speed * 60}
                SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE={cfg.wipe_retract}
            {% endif %}

            # 5. Fan blast to solidify
            SET_PIN PIN={fan_pin} VALUE=1.0
            G4 P{cfg.wipe_cool_time * 1000}
            SET_PIN PIN={fan_pin} VALUE=0

            # 6. Wiggle over wiper to clean nozzle tip
            G90
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}

            RESPOND MSG="Hydra: Nozzle wipe complete"
        {% endif %}
    {% endif %}
