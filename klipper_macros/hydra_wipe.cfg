# Hydra for Klipper - Nozzle Wipe System
#
# Purges filament, cools with fan blast, then snaps against a
# stationary wiper wall to knock off the solidified blob.
#
# Configure wipe parameters in hydra_variables.cfg.
# Set wipe_enabled to True and adjust wipe_x to match your wiper position.


[gcode_macro NOZZLE_WIPE]
description: Purge filament, cool it, and knock it off against the wiper wall
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    # Skip if disabled or nozzle is cold
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% set nozzle_temp = printer[printer.toolhead.extruder].temperature|float %}

    {% if not cfg.wipe_enabled %}
        RESPOND MSG="Hydra: Nozzle wipe disabled"
    {% elif nozzle_target < cfg.min_toolchange_temp %}
        RESPOND MSG="Hydra: Skipping wipe - nozzle cold ({nozzle_target}C target)"
    {% else %}
        # Wait for nozzle to reach extrusion temp before wiping
        {% if nozzle_temp < cfg.min_toolchange_temp %}
            RESPOND MSG="Hydra: Waiting for nozzle to reach {cfg.min_toolchange_temp}C before wipe..."
            TEMPERATURE_WAIT SENSOR={printer.toolhead.extruder} MINIMUM={cfg.min_toolchange_temp}
        {% endif %}

        {% set PURGE_LENGTH = params.PURGE_LENGTH|default(cfg.wipe_purge_length)|float %}
        {% set PURGE_SPEED = params.PURGE_SPEED|default(cfg.wipe_purge_speed)|float %}
        {% set COOL_TIME = params.COOL_TIME|default(cfg.wipe_cool_time)|int %}

        # Determine active tool's fan pin
        {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
        {% if current_tool == 0 %}
            {% set fan_pin = cfg.fan_pin_t0 %}
        {% else %}
            {% set fan_pin = cfg.fan_pin_t1 %}
        {% endif %}

        # Save current acceleration
        {% set old_accel = printer.toolhead.max_accel %}

        # Move to purge position
        G90
        G1 X{cfg.wipe_x} F{cfg.travel_speed * 60}

        # Extrude purge line
        M83
        G1 E{PURGE_LENGTH} F{PURGE_SPEED * 60}

        # Blast part cooling fan at full speed to solidify the blob
        SET_PIN PIN={fan_pin} VALUE=1.0

        # Wait for filament to solidify
        G4 P{COOL_TIME * 1000}

        # Turn off fan blast
        SET_PIN PIN={fan_pin} VALUE=0

        # Set high acceleration for the snap move
        SET_VELOCITY_LIMIT ACCEL={cfg.wipe_snap_accel}

        # Quick snap move left to knock filament off against wiper wall
        G91
        G1 X-{cfg.wipe_snap_distance} F{cfg.wipe_snap_speed * 60}
        G90

        # Restore original acceleration
        SET_VELOCITY_LIMIT ACCEL={old_accel}

        RESPOND MSG="Hydra: Nozzle wipe complete"
    {% endif %}
