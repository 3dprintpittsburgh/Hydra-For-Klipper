# Hydra for Klipper - Nozzle Wipe System
#
# Sequence: prime retracted amount → purge → small retract → cool → snap wipe
# Called between _HYDRA_ACTIVATE and _HYDRA_POSITION during toolchange.
#
# Configure wipe parameters in hydra_variables.cfg.
# Set wipe_enabled to True and adjust wipe_x to match your wiper position.


[gcode_macro NOZZLE_WIPE]
description: Prime, purge, cool, and snap against wiper wall
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}

    # Skip if disabled
    {% if not cfg.wipe_enabled %}
        RESPOND MSG="Hydra: Nozzle wipe disabled"

    {% else %}
        # Skip if nozzle is cold (no target or below min temp)
        {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
        {% set nozzle_temp = printer[printer.toolhead.extruder].temperature|float %}

        {% if nozzle_target < cfg.min_toolchange_temp %}
            RESPOND MSG="Hydra: Skipping wipe - nozzle cold"

        {% else %}
            # Wait for nozzle to reach extrusion temp
            {% if nozzle_temp < cfg.min_toolchange_temp %}
                RESPOND MSG="Hydra: Waiting for temp before wipe..."
                {% if current_tool == 0 %}
                    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={cfg.min_toolchange_temp}
                {% else %}
                    TEMPERATURE_WAIT SENSOR="extruder1" MINIMUM={cfg.min_toolchange_temp}
                {% endif %}
            {% endif %}

            # Get retract depth for this tool
            {% if current_tool == 0 %}
                {% set retract_depth = cfg.t0_retract_depth %}
            {% else %}
                {% set retract_depth = cfg.t1_retract_depth %}
            {% endif %}

            {% set fan_pin = cfg.fan_pin_t0 if current_tool == 0 else cfg.fan_pin_t1 %}
            {% set old_accel = printer.toolhead.max_accel %}

            # 1. Move to purge position
            G90
            G1 X{cfg.wipe_x} F{cfg.travel_speed * 60}

            M83

            # 2. Prime: push back the retracted filament amount
            {% if retract_depth > 0 %}
                G1 E{retract_depth} F{cfg.prime_speed * 60}
                SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE=0
            {% endif %}

            # 3. Purge: extrude extra to flush old material
            G1 E{cfg.wipe_purge_length} F{cfg.wipe_purge_speed * 60}

            # 4. Small retract for clean tip break
            {% if cfg.wipe_retract > 0 %}
                G1 E-{cfg.wipe_retract} F{cfg.retract_speed * 60}
                SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE={cfg.wipe_retract}
            {% endif %}

            # 5. Fan blast to solidify
            SET_PIN PIN={fan_pin} VALUE=1.0
            G4 P{cfg.wipe_cool_time * 1000}
            SET_PIN PIN={fan_pin} VALUE=0

            # 6. Wiggle over wiper to clean nozzle tip
            SET_VELOCITY_LIMIT ACCEL={cfg.wipe_snap_accel}
            G90
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
            G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
            SET_VELOCITY_LIMIT ACCEL={old_accel}

            RESPOND MSG="Hydra: Nozzle wipe complete"
        {% endif %}
    {% endif %}


[gcode_macro TEST_WIPE_WIGGLE]
description: Test the wipe wiggle motion without heating or extruding
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        RESPOND TYPE=error MSG="Home first"
    {% else %}
        {% set old_accel = printer.toolhead.max_accel %}
        SET_VELOCITY_LIMIT ACCEL={cfg.wipe_snap_accel}
        G90
        G1 X{cfg.wipe_x} F{cfg.travel_speed * 60}
        G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
        G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
        G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
        G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
        G1 X{cfg.wipe_x - 20} F{cfg.wipe_snap_speed * 60}
        G1 X{cfg.wipe_x} F{cfg.wipe_snap_speed * 60}
        SET_VELOCITY_LIMIT ACCEL={old_accel}
        RESPOND MSG="Hydra: Wiggle test complete"
    {% endif %}


# =============================================================================
# Auto-tune wipe speed/accel using TMC MSCNT step-loss detection
# Requires [tmc_mscnt stepper_x] in printer.cfg
# =============================================================================

[gcode_macro _WIPE_TUNE_ITERATION]
description: Single iteration of wipe speed tuning (called by TUNE_WIPE_SPEED)
variable_best_speed: 0
variable_best_accel: 0
variable_testing: False
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set speed = params.SPEED|float %}
    {% set accel = params.ACCEL|float %}
    {% set step = params.SPEED_STEP|default(10)|float %}
    {% set accel_step = params.ACCEL_STEP|default(500)|float %}
    {% set max_speed = params.MAX_SPEED|default(500)|float %}
    {% set max_accel = params.MAX_ACCEL|default(15000)|float %}
    {% set phase = params.PHASE|default("speed")|string %}
    {% set old_accel = printer.toolhead.max_accel %}

    # Read MSCNT before
    READ_MSCNT STEPPER=stepper_x
    {% set mscnt_before = printer["tmc_mscnt stepper_x"].mscnt %}

    # Do a wiggle round-trip at test values
    SET_VELOCITY_LIMIT ACCEL={accel}
    G90
    G1 X{cfg.wipe_x} F{speed * 60}
    G1 X{cfg.wipe_x - 20} F{speed * 60}
    G1 X{cfg.wipe_x} F{speed * 60}
    G1 X{cfg.wipe_x - 20} F{speed * 60}
    G1 X{cfg.wipe_x} F{speed * 60}

    # Wait for moves to complete
    M400

    # Read MSCNT after
    READ_MSCNT STEPPER=stepper_x
    {% set mscnt_after = printer["tmc_mscnt stepper_x"].mscnt %}

    SET_VELOCITY_LIMIT ACCEL={old_accel}

    {% if mscnt_before == mscnt_after %}
        # No step loss - save as best and try higher
        SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=best_speed VALUE={speed}
        SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=best_accel VALUE={accel}
        RESPOND MSG="Hydra tune: speed={speed} accel={accel} - OK (MSCNT={mscnt_after})"

        {% if phase == "speed" %}
            {% set next_speed = speed + step %}
            {% if next_speed <= max_speed %}
                _WIPE_TUNE_ITERATION SPEED={next_speed} ACCEL={accel} SPEED_STEP={step} ACCEL_STEP={accel_step} MAX_SPEED={max_speed} MAX_ACCEL={max_accel} PHASE=speed
            {% else %}
                # Speed maxed out, now ramp accel
                RESPOND MSG="Hydra tune: Max speed found: {speed}mm/s. Now testing accel..."
                {% set next_accel = accel + accel_step %}
                {% if next_accel <= max_accel %}
                    _WIPE_TUNE_ITERATION SPEED={speed} ACCEL={next_accel} SPEED_STEP={step} ACCEL_STEP={accel_step} MAX_SPEED={max_speed} MAX_ACCEL={max_accel} PHASE=accel
                {% else %}
                    RESPOND MSG="Hydra tune: COMPLETE - Best: speed={speed}mm/s accel={accel}mm/s2"
                    SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=testing VALUE=False
                {% endif %}
            {% endif %}
        {% elif phase == "accel" %}
            {% set next_accel = accel + accel_step %}
            {% if next_accel <= max_accel %}
                _WIPE_TUNE_ITERATION SPEED={speed} ACCEL={next_accel} SPEED_STEP={step} ACCEL_STEP={accel_step} MAX_SPEED={max_speed} MAX_ACCEL={max_accel} PHASE=accel
            {% else %}
                RESPOND MSG="Hydra tune: COMPLETE - Best: speed={speed}mm/s accel={accel}mm/s2"
                SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=testing VALUE=False
            {% endif %}
        {% endif %}
    {% else %}
        # Step loss detected!
        {% set prev_speed = printer["gcode_macro _WIPE_TUNE_ITERATION"].best_speed %}
        {% set prev_accel = printer["gcode_macro _WIPE_TUNE_ITERATION"].best_accel %}
        RESPOND MSG="Hydra tune: speed={speed} accel={accel} - STEP LOSS (MSCNT {mscnt_before} -> {mscnt_after})"
        {% if phase == "speed" %}
            # Speed caused loss - use previous speed, now test accel
            RESPOND MSG="Hydra tune: Max safe speed: {prev_speed}mm/s. Now testing accel..."
            {% set next_accel = prev_accel + accel_step %}
            {% if next_accel <= max_accel %}
                _WIPE_TUNE_ITERATION SPEED={prev_speed} ACCEL={next_accel} SPEED_STEP={step} ACCEL_STEP={accel_step} MAX_SPEED={max_speed} MAX_ACCEL={max_accel} PHASE=accel
            {% else %}
                RESPOND MSG="Hydra tune: COMPLETE - Best: speed={prev_speed}mm/s accel={prev_accel}mm/s2"
                SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=testing VALUE=False
            {% endif %}
        {% else %}
            RESPOND MSG="Hydra tune: COMPLETE - Best: speed={prev_speed}mm/s accel={prev_accel}mm/s2"
            SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=testing VALUE=False
        {% endif %}
    {% endif %}


[gcode_macro TUNE_WIPE_SPEED]
description: Auto-find maximum wipe speed/accel without step loss (requires tmc_mscnt)
gcode:
    {% set START_SPEED = params.START_SPEED|default(100)|float %}
    {% set SPEED_STEP = params.SPEED_STEP|default(20)|float %}
    {% set START_ACCEL = params.START_ACCEL|default(3000)|float %}
    {% set ACCEL_STEP = params.ACCEL_STEP|default(1000)|float %}
    {% set MAX_SPEED = params.MAX_SPEED|default(500)|float %}
    {% set MAX_ACCEL = params.MAX_ACCEL|default(15000)|float %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        RESPOND TYPE=error MSG="Home first"
    {% elif printer["tmc_mscnt stepper_x"] is not defined %}
        RESPOND TYPE=error MSG="Add [tmc_mscnt stepper_x] to printer.cfg first"
    {% else %}
        RESPOND MSG="Hydra tune: Starting wipe speed/accel auto-tune"
        RESPOND MSG="Hydra tune: Speed {START_SPEED}-{MAX_SPEED} step {SPEED_STEP} | Accel {START_ACCEL}-{MAX_ACCEL} step {ACCEL_STEP}"
        SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=best_speed VALUE={START_SPEED}
        SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=best_accel VALUE={START_ACCEL}
        SET_GCODE_VARIABLE MACRO=_WIPE_TUNE_ITERATION VARIABLE=testing VALUE=True
        _WIPE_TUNE_ITERATION SPEED={START_SPEED} ACCEL={START_ACCEL} SPEED_STEP={SPEED_STEP} ACCEL_STEP={ACCEL_STEP} MAX_SPEED={MAX_SPEED} MAX_ACCEL={MAX_ACCEL} PHASE=speed
    {% endif %}
