# Hydra for Klipper - Zone-Aware LED System
#
# Supports per-tool LED zones (left/right halves of a strip) with
# state-aware effects: printing, standby, preheating, idle, toolchange.
#
# Requires klipper-led_effect plugin: https://github.com/julianschill/klipper-led_effect
# Set all led variables to "" in hydra_variables.cfg to disable entirely.
#
# LED strip is split into two zones:
#   Left zone  (T0) = pixels led_zone_left_start to led_zone_left_end
#   Right zone (T1) = pixels led_zone_right_start to led_zone_right_end


# =============================================================================
# Set a tool's LED zone to a specific state
# =============================================================================
[gcode_macro _HYDRA_LED_TOOL]
description: Set LED effect for a specific tool's zone
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|default(0)|int %}
    {% set state = params.STATE|default("idle")|string %}

    # Skip if LEDs not configured
    {% if not cfg.led_strip_name %}
        {% set skip = True %}
    {% else %}
        {% set skip = False %}
    {% endif %}

    {% if not skip %}
        # Determine which zone
        {% if tool == 0 %}
            {% set zone_start = cfg.led_zone_left_start %}
            {% set zone_end = cfg.led_zone_left_end %}
        {% else %}
            {% set zone_start = cfg.led_zone_right_start %}
            {% set zone_end = cfg.led_zone_right_end %}
        {% endif %}

        # Map state to effect name from config
        {% if state == "printing" %}
            {% set effect = cfg.led_effect_printing %}
        {% elif state == "standby" %}
            {% set effect = cfg.led_effect_standby %}
        {% elif state == "preheating" %}
            {% set effect = cfg.led_effect_preheating %}
        {% elif state == "idle" %}
            {% set effect = cfg.led_effect_idle %}
        {% else %}
            {% set effect = "" %}
        {% endif %}

        {% if effect %}
            # Stop any existing effect on this zone first
            SET_LED_EFFECT EFFECT={effect} STOP=1
            # Start the effect (LED Effects plugin handles zone via effect definition)
            SET_LED_EFFECT EFFECT={effect}
        {% else %}
            # No effect defined for this state - set zone to off
            {% for i in range(zone_start, zone_end + 1) %}
                SET_LED LED={cfg.led_strip_name} INDEX={i} RED=0 GREEN=0 BLUE=0 TRANSMIT={1 if i == zone_end else 0}
            {% endfor %}
        {% endif %}
    {% endif %}


# =============================================================================
# Set global LED effect (full strip)
# =============================================================================
[gcode_macro _HYDRA_LED_GLOBAL]
description: Set LED effect on entire strip
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set state = params.STATE|default("off")|string %}

    {% if cfg.led_strip_name %}
        {% if state == "toolchange" and cfg.led_effect_toolchange %}
            STOP_LED_EFFECTS
            SET_LED_EFFECT EFFECT={cfg.led_effect_toolchange}
        {% elif state == "off" %}
            STOP_LED_EFFECTS
            SET_LED LED={cfg.led_strip_name} RED=0 GREEN=0 BLUE=0
        {% endif %}
    {% endif %}


# =============================================================================
# Update both zones based on current tool states
# Call this after any state change to sync LEDs
# =============================================================================
[gcode_macro _HYDRA_LED_UPDATE]
description: Update LED zones to reflect current tool states
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    {% if cfg.led_strip_name %}
        # Stop any global effects first
        STOP_LED_EFFECTS

        # Determine T0 state
        {% set t0_target = printer.extruder.target|default(0)|float %}
        {% set t0_temp = printer.extruder.temperature|default(0)|float %}
        {% if printer["dual_carriage"].carriage_0 == "PRIMARY" %}
            _HYDRA_LED_TOOL TOOL=0 STATE=printing
        {% elif t0_target > 0 and t0_temp < t0_target - 20 %}
            _HYDRA_LED_TOOL TOOL=0 STATE=preheating
        {% elif t0_target > 0 %}
            _HYDRA_LED_TOOL TOOL=0 STATE=standby
        {% else %}
            _HYDRA_LED_TOOL TOOL=0 STATE=idle
        {% endif %}

        # Determine T1 state
        {% set t1_target = printer.extruder1.target|default(0)|float %}
        {% set t1_temp = printer.extruder1.temperature|default(0)|float %}
        {% if printer["dual_carriage"].carriage_1 == "PRIMARY" %}
            _HYDRA_LED_TOOL TOOL=1 STATE=printing
        {% elif t1_target > 0 and t1_temp < t1_target - 20 %}
            _HYDRA_LED_TOOL TOOL=1 STATE=preheating
        {% elif t1_target > 0 %}
            _HYDRA_LED_TOOL TOOL=1 STATE=standby
        {% else %}
            _HYDRA_LED_TOOL TOOL=1 STATE=idle
        {% endif %}
    {% endif %}
