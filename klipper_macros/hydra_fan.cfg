# Hydra for Klipper - IDEX Fan Routing
#
# Overrides M106/M107 to route fan commands to the correct tool's
# part cooling fan based on active carriage or explicit P parameter.
#
# Fan pin names are configured in hydra_variables.cfg:
#   variable_fan_pin_t0: "extruder_fan"
#   variable_fan_pin_t1: "extruder1_fan"
#
# Requires [output_pin] sections for each fan in your printer.cfg.


[gcode_macro M106]
description: Hydra IDEX fan control - routes to active tool's fan
rename_existing: M106.1
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set TOOL = params.P|default(-1)|int %}
    {% set SPEED = params.S|default(255)|int %}
    {% set fan_speed = SPEED / 255.0 %}

    {% if TOOL == 0 %}
        # Explicit T0 fan
        SET_PIN PIN={cfg.fan_pin_t0} VALUE={fan_speed}
    {% elif TOOL == 1 %}
        # Explicit T1 fan
        SET_PIN PIN={cfg.fan_pin_t1} VALUE={fan_speed}
    {% else %}
        # No tool specified - route to active carriage's fan
        {% if printer["dual_carriage"].carriage_1 == "PRIMARY" %}
            SET_PIN PIN={cfg.fan_pin_t1} VALUE={fan_speed}
        {% else %}
            SET_PIN PIN={cfg.fan_pin_t0} VALUE={fan_speed}
        {% endif %}
    {% endif %}


[gcode_macro M107]
description: Hydra IDEX fan off - routes to active tool's fan
rename_existing: M107.1
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set TOOL = params.P|default(-1)|int %}

    {% if TOOL == 0 %}
        SET_PIN PIN={cfg.fan_pin_t0} VALUE=0
    {% elif TOOL == 1 %}
        SET_PIN PIN={cfg.fan_pin_t1} VALUE=0
    {% else %}
        # No tool specified - turn off both fans
        SET_PIN PIN={cfg.fan_pin_t0} VALUE=0
        SET_PIN PIN={cfg.fan_pin_t1} VALUE=0
    {% endif %}
