# Hydra for Klipper - Print Start/End/Pause/Resume Macros
#
# Generic IDEX-aware print lifecycle macros.
# Accepts standard slicer parameters and integrates with Hydra toolchange.
#
# Recommended PrusaSlicer/OrcaSlicer start gcode:
#   START_PRINT BED_TEMP=[first_layer_bed_temperature] EXTRUDER_TEMP=[first_layer_temperature_0] EXTRUDER_TEMP_T1=[first_layer_temperature_1] INITIAL_TOOL=[initial_tool] TOTAL_TOOLCHANGES=[total_toolchanges]
#
# Override hooks: define _HYDRA_USER_START_PRINT or _HYDRA_USER_END_PRINT
# in your printer.cfg for custom pre/post actions (e.g. LED effects, sounds).


[gcode_macro START_PRINT]
description: Hydra IDEX print start - heats, homes, meshes, initializes toolchange
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set EXTRUDER_TEMP_T1 = params.EXTRUDER_TEMP_T1|default(0)|float %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default(0)|int %}
    {% set TOTAL_TOOLCHANGES = params.TOTAL_TOOLCHANGES|default(0)|int %}

    # User hook (define _HYDRA_USER_START_PRINT for custom actions like LEDs)
    _HYDRA_USER_START_PRINT

    RESPOND MSG="Hydra: Starting print"

    # Start heating bed and T0
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP} T0

    # LED: T0 preheating
    _HYDRA_LED_TOOL TOOL=0 STATE=preheating

    # Smart T1 preheat: only if this print actually uses T1
    {% if TOTAL_TOOLCHANGES > 0 and EXTRUDER_TEMP_T1 > 0 %}
        RESPOND MSG="Hydra: Dual-material ({TOTAL_TOOLCHANGES} toolchanges)"
        RESPOND MSG="Hydra: Preheating T1 to {EXTRUDER_TEMP_T1}c"
        M104 S{EXTRUDER_TEMP_T1} T1
        # LED: T1 preheating too
        _HYDRA_LED_TOOL TOOL=1 STATE=preheating
    {% elif INITIAL_TOOL == 1 and EXTRUDER_TEMP_T1 > 0 %}
        RESPOND MSG="Hydra: Preheating T1 to {EXTRUDER_TEMP_T1}c (initial tool)"
        M104 S{EXTRUDER_TEMP_T1} T1
        _HYDRA_LED_TOOL TOOL=1 STATE=preheating
    {% else %}
        M104 S0 T1
        # LED: T1 idle
        _HYDRA_LED_TOOL TOOL=1 STATE=idle
    {% endif %}

    # Home and mesh
    G28
    BED_MESH_CALIBRATE

    # Wait for temperatures
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP} T0

    # Initialize Hydra toolchange state
    HYDRA_INIT TOOL={INITIAL_TOOL}

    # LED: initial tool printing, other idle or standby
    _HYDRA_LED_UPDATE


[gcode_macro END_PRINT]
description: Hydra IDEX print end - cools down, parks, disables motors
gcode:
    # Turn off heaters and fans
    M106 S0
    M106 P1 S0
    M104 S0 T0
    M104 S0 T1
    M140 S0

    # Park active tool and clean up
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    # Retract a bit to prevent ooze
    M83
    G1 E-{cfg.retract_distance / 4} F{cfg.retract_speed * 60}

    # Move bed forward for easy part removal
    G90
    G1 Y{printer.configfile.config['stepper_y'].position_max|float - 10} F{cfg.travel_speed * 60}

    # Ensure T0 is active for next print
    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    # LED: everything off
    _HYDRA_LED_GLOBAL STATE=off

    # User hook
    _HYDRA_USER_END_PRINT

    # Disable motors
    M84


[gcode_macro PAUSE]
description: Pause print - parks active tool
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    {% if "xyz" in printer.toolhead.homed_axes %}
        {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
        _HYDRA_PARK TOOL={current_tool}
    {% else %}
        {action_respond_info("Printer not homed")}
    {% endif %}


[gcode_macro RESUME]
description: Resume print - restores active tool
rename_existing: RESUME_BASE
gcode:
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
    _HYDRA_ACTIVATE TOOL={current_tool}
    _HYDRA_POSITION TOOL={current_tool}
    RESUME_BASE {rawparams}


[gcode_macro CANCEL_PRINT]
description: Cancel print
rename_existing: CANCEL_PRINT_BASE
gcode:
    END_PRINT
    CANCEL_PRINT_BASE


[gcode_macro M0]
description: Alias for PAUSE
gcode:
    PAUSE


# =============================================================================
# User override hooks (define these in your printer.cfg for custom behavior)
# =============================================================================

[gcode_macro _HYDRA_USER_START_PRINT]
gcode:
    # Override this macro in your printer.cfg for custom start actions
    # Example: SET_PRINTING_LEDS, # custom notification, etc.

[gcode_macro _HYDRA_USER_END_PRINT]
gcode:
    # Override this macro in your printer.cfg for custom end actions
    # Example: play sound, send notification, etc.
