# Hydra for Klipper - Print Start/End/Pause/Resume Macros
#
# Generic IDEX-aware print lifecycle macros.
# Accepts standard slicer parameters and integrates with Hydra toolchange.
#
# Recommended PrusaSlicer/OrcaSlicer start gcode:
#   START_PRINT BED_TEMP=[first_layer_bed_temperature] EXTRUDER_TEMP=[first_layer_temperature_0] EXTRUDER_TEMP_T1=[first_layer_temperature_1] INITIAL_TOOL=[initial_tool] TOTAL_TOOLCHANGES=[total_toolchanges]
#
# Override hooks: define _HYDRA_USER_START_PRINT or _HYDRA_USER_END_PRINT
# in your printer.cfg for custom pre/post actions (e.g. LED effects, sounds).


[gcode_macro START_PRINT]
description: Hydra IDEX print start - heats, homes, meshes, initializes toolchange
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set EXTRUDER_TEMP_T1 = params.EXTRUDER_TEMP_T1|default(0)|float %}
    {% set INITIAL_TOOL = params.INITIAL_TOOL|default(0)|int %}
    {% set TOTAL_TOOLCHANGES = params.TOTAL_TOOLCHANGES|default(0)|int %}

    # User hook (define _HYDRA_USER_START_PRINT for custom actions like LEDs)
    _HYDRA_USER_START_PRINT

    RESPOND MSG="Hydra: Starting print"

    # Determine which tools need heating
    {% set heat_t0 = INITIAL_TOOL == 0 or TOTAL_TOOLCHANGES > 0 %}
    {% set heat_t1 = INITIAL_TOOL == 1 or (TOTAL_TOOLCHANGES > 0 and EXTRUDER_TEMP_T1 > 0) %}

    # Start heating bed
    M140 S{BED_TEMP}

    # Heat T0 only if this print uses it
    {% if heat_t0 %}
        M104 S{EXTRUDER_TEMP} T0
        _HYDRA_LED_TOOL TOOL=0 STATE=preheating
    {% else %}
        M104 S0 T0
        _HYDRA_LED_TOOL TOOL=0 STATE=idle
    {% endif %}

    # Heat T1 only if this print uses it
    {% if heat_t1 %}
        {% set t1_temp = EXTRUDER_TEMP_T1 if EXTRUDER_TEMP_T1 > 0 else EXTRUDER_TEMP %}
        RESPOND MSG="Hydra: Preheating T1 to {t1_temp}c"
        M104 S{t1_temp} T1
        _HYDRA_LED_TOOL TOOL=1 STATE=preheating
    {% else %}
        M104 S0 T1
        _HYDRA_LED_TOOL TOOL=1 STATE=idle
    {% endif %}

    {% if TOTAL_TOOLCHANGES > 0 %}
        RESPOND MSG="Hydra: Dual-material ({TOTAL_TOOLCHANGES} toolchanges)"
    {% endif %}

    # Home and mesh (always uses T0 carriage for BLTouch)
    G28
    BED_MESH_CALIBRATE

    # Wait for bed
    M190 S{BED_TEMP}

    # Wait for the initial tool's nozzle
    {% if INITIAL_TOOL == 0 %}
        M109 S{EXTRUDER_TEMP} T0
    {% else %}
        {% set t1_temp = EXTRUDER_TEMP_T1 if EXTRUDER_TEMP_T1 > 0 else EXTRUDER_TEMP %}
        M109 S{t1_temp} T1
    {% endif %}

    # Park T0 before switching if initial tool is T1
    # (T0 is sitting at last probe position after BED_MESH_CALIBRATE)
    {% if INITIAL_TOOL == 1 %}
        G90
        G1 X{cfg.park_x_t0} F{cfg.travel_speed * 60}
    {% endif %}

    # Initialize Hydra toolchange state
    HYDRA_INIT TOOL={INITIAL_TOOL}

    # Save initial temps so first toolchange has correct saved_temp for TEMPERATURE_WAIT
    # (HYDRA_INIT resets saved temps to 0, but the first toolchange needs to know
    # what temperature to wait for before extruding)
    {% if heat_t0 %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_temp VALUE={EXTRUDER_TEMP|int}
    {% endif %}
    {% if heat_t1 %}
        {% set t1_temp_init = EXTRUDER_TEMP_T1 if EXTRUDER_TEMP_T1 > 0 else EXTRUDER_TEMP %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_temp VALUE={t1_temp_init|int}
    {% endif %}

    # LED: initial tool printing, other idle or standby
    _HYDRA_LED_UPDATE


[gcode_macro END_PRINT]
description: Hydra IDEX print end - parks both tools, cools down, presents bed
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
    {% set y_present = printer.configfile.config['stepper_y'].position_max|float - 10 %}

    RESPOND MSG="Hydra: Print complete"

    # Park whichever tool is currently active
    _HYDRA_PARK TOOL={current_tool}

    # If T1 was active, switch to T0 and park it too
    # If T0 was active, switch to T1 and park it (if it was used)
    {% if current_tool == 1 %}
        # T1 is parked. Switch to T0 and park it.
        SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        _HYDRA_PARK TOOL=0
    {% else %}
        # T0 is parked. Park T1 if it has a nonzero saved position (was used during print).
        {% if cfg.t1_saved_x != 0 or cfg.t1_saved_y != 0 %}
            SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=1
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
            _HYDRA_PARK TOOL=1
        {% endif %}
    {% endif %}

    # Disable all heaters
    M104 S0 T0
    M104 S0 T1
    M140 S0

    # Disable part fans (use fan pins from config)
    {% if cfg.fan_pin_t0 != "" %}
        SET_PIN PIN={cfg.fan_pin_t0} VALUE=0
    {% endif %}
    {% if cfg.fan_pin_t1 != "" %}
        SET_PIN PIN={cfg.fan_pin_t1} VALUE=0
    {% endif %}

    # Return to T0 for next print, clear offsets
    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    # Present bed - move Y to rear for part removal
    G90
    G1 Y{y_present} F{cfg.travel_speed * 60}

    # Reset per-print state (positions, temps, fans) but preserve calibration offsets
    HYDRA_INIT TOOL=0

    # LED: everything off
    _HYDRA_LED_GLOBAL STATE=off

    # User hook
    _HYDRA_USER_END_PRINT

    # Disable motors
    M84


[gcode_macro PAUSE]
description: Pause print - parks active tool without changing temps
rename_existing: PAUSE_BASE
variable_paused_temp: 0
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
        {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}

        # Save the active nozzle's current target for restore on resume
        {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
        SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=paused_temp VALUE={nozzle_target|int}

        PAUSE_BASE

        # Retract to prevent ooze
        {% if nozzle_target > cfg.min_toolchange_temp %}
            M83
            G1 E-{cfg.retract_distance} F{cfg.retract_speed * 60}
            SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE={cfg.retract_distance}
        {% endif %}

        # Z hop and park X (no temp change)
        G91
        G1 Z{cfg.z_hop} F{cfg.z_hop_speed * 60}
        G90
        {% if current_tool == 0 %}
            G1 X{cfg.park_x_t0} F{cfg.travel_speed * 60}
        {% else %}
            G1 X{cfg.park_x_t1} F{cfg.travel_speed * 60}
        {% endif %}
    {% else %}
        {action_respond_info("Printer not homed")}
    {% endif %}


[gcode_macro RESUME]
description: Resume print - restores temp, primes, and continues
rename_existing: RESUME_BASE
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
    {% set paused_temp = printer["gcode_macro PAUSE"].paused_temp %}

    # Restore print temperature and wait for it
    {% if paused_temp > 0 %}
        {% if current_tool == 0 %}
            M104 T0 S{paused_temp}
            TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={paused_temp - cfg.temp_restore_delta}
        {% else %}
            M104 T1 S{paused_temp}
            TEMPERATURE_WAIT SENSOR="extruder1" MINIMUM={paused_temp - cfg.temp_restore_delta}
        {% endif %}
    {% endif %}

    # Prime retracted filament
    {% set retract_depth = cfg.t0_retract_depth if current_tool == 0 else cfg.t1_retract_depth %}
    {% if retract_depth > 0 %}
        M83
        G1 E{retract_depth} F{cfg.prime_speed * 60}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{current_tool}_retract_depth VALUE=0
    {% endif %}

    # Drop Z back down
    G91
    G1 Z-{cfg.z_hop} F{cfg.z_hop_speed * 60}
    G90

    RESUME_BASE {rawparams}


[gcode_macro CANCEL_PRINT]
description: Cancel print
rename_existing: CANCEL_PRINT_BASE
gcode:
    END_PRINT
    CANCEL_PRINT_BASE


[gcode_macro M0]
description: Alias for PAUSE
gcode:
    PAUSE


# =============================================================================
# User override hooks (define these in your printer.cfg for custom behavior)
# =============================================================================

[gcode_macro _HYDRA_USER_START_PRINT]
gcode:
    # Override this macro in your printer.cfg for custom start actions
    # Example: SET_PRINTING_LEDS, # custom notification, etc.

[gcode_macro _HYDRA_USER_END_PRINT]
gcode:
    # Override this macro in your printer.cfg for custom end actions
    # Example: play sound, send notification, etc.
