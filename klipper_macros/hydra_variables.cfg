# Hydra for Klipper - User Configuration
#
# Edit these variables to match your IDEX printer setup.
# This is the ONLY file you should need to modify.

[gcode_macro _HYDRA_CONFIG]

# Park positions
variable_park_x_t0: -8.5          # T0 park X (typically stepper_x position_min)
variable_park_x_t1: 497.5         # T1 park X (typically dual_carriage position_max)
variable_park_y: 350.0            # Y position when parked (typically position_max, out of the way)

# Carriage safety
variable_safe_distance: 80.0      # Minimum X gap between carriages (mm) to prevent collision

# Z hop during toolchange
variable_z_hop: 2.0               # Z lift during toolchange (mm)
variable_z_hop_speed: 15          # Z hop speed (mm/s)

# Travel speed
variable_travel_speed: 200        # XY travel speed during toolchange (mm/s)

# Filament retract/prime
variable_retract_distance: 20     # Filament retract on park (mm)
variable_retract_speed: 30        # Retract speed (mm/s)
variable_prime_distance: 20       # Filament prime on restore (mm)
variable_prime_speed: 20          # Prime speed (mm/s)

# Standby temperature
variable_standby_temp_factor: 0.9 # Standby temp = active temp * this factor
variable_min_toolchange_temp: 170 # Minimum temp to allow extrusion during toolchange

# T1 gcode offsets (calibrated values)
variable_offset_x_t1: 0.0        # T1 X offset
variable_offset_y_t1: 0.0        # T1 Y offset
variable_offset_z_t1: 0.0        # T1 Z offset

# Runtime state (managed by macros - do not edit)
variable_active_tool: -1          # Current tool (-1 = unknown, 0 = T0, 1 = T1)
variable_t0_saved_x: 0.0
variable_t0_saved_y: 0.0
variable_t0_saved_z: 0.0
variable_t1_saved_x: 0.0
variable_t1_saved_y: 0.0
variable_t1_saved_z: 0.0
variable_t0_retracted: False
variable_t1_retracted: False

gcode:
    # Config macro - no gcode, just variables
