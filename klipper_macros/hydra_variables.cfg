# Hydra for Klipper - User Configuration
#
# Edit these variables to match your IDEX printer setup.
# This is the ONLY file you should need to modify.

[gcode_macro _HYDRA_CONFIG]

# Park positions
variable_park_x_t0: -8.5          # T0 park X (typically stepper_x position_min)
variable_park_x_t1: 497.5         # T1 park X (typically dual_carriage position_max)
variable_park_y: 350.0            # Y position when parked (typically position_max)

# Carriage safety
variable_safe_distance: 80.0      # Minimum X gap between carriages (mm)

# Z hop during toolchange
variable_z_hop: 2.0               # Z lift during toolchange (mm)
variable_z_hop_speed: 15          # Z hop speed (mm/s)

# Travel speed
variable_travel_speed: 200        # XY travel speed during toolchange (mm/s)

# Filament management
# Park retract: deep retract when parking a tool
variable_retract_distance: 5      # Filament retract on park (mm)
variable_retract_speed: 30        # Retract speed (mm/s)
# Wipe retract: small retract after purge for clean tip break
variable_wipe_retract: 2          # Retract after purge before cooling (mm)
# Extra prime: additional filament when arriving at print position
variable_extra_prime: 0           # Extra prime at print position (mm), 0 to disable
variable_prime_speed: 20          # Prime/extrude speed (mm/s)

# Temperature management
variable_standby_temp_factor: 0.9 # Standby temp = active temp * this factor
variable_min_toolchange_temp: 170 # Minimum temp to allow extrusion during toolchange
variable_temp_restore_delta: 10   # Degrees below target to consider "close enough"

# T1 gcode offsets (calibrated values - updated by calibration macros)
variable_offset_x_t1: 0.0        # T1 X offset
variable_offset_y_t1: 0.0        # T1 Y offset
variable_offset_z_t1: 0.0        # T1 Z offset

# Fan pin names (configure for your printer's output_pin names)
variable_fan_pin_t0: "extruder_fan"
variable_fan_pin_t1: "extruder1_fan"

# Nozzle wipe (set wipe_enabled to False to disable)
variable_wipe_enabled: False          # Enable nozzle wipe on toolchange
variable_wipe_x: 427.5               # X position to extrude purge line
variable_wipe_purge_length: 20        # Purge extrusion length (mm)
variable_wipe_purge_speed: 5          # Purge speed (mm/s)
variable_wipe_cool_time: 5            # Fan blast time to solidify (seconds)
variable_wipe_snap_distance: 25       # Distance to snap left against wiper wall (mm)
variable_wipe_snap_speed: 300         # Snap move speed (mm/s)
variable_wipe_snap_accel: 10000       # Snap move acceleration (mm/s²)

# LED Configuration
# Set led_strip_name to "" to disable all LED features
variable_led_strip_name: "main_leds"     # Your [neopixel] section name

# LED zones (pixel ranges for each toolhead's side of the strip)
variable_led_zone_left_start: 1          # First pixel for T0 zone
variable_led_zone_left_end: 12           # Last pixel for T0 zone
variable_led_zone_right_start: 13        # First pixel for T1 zone
variable_led_zone_right_end: 24          # Last pixel for T1 zone

# LED effects per state (names must match [led_effect] sections)
# Set any to "" to skip that state's effect
variable_led_effect_toolchange: "hydra_toolchange"   # Global: during toolchange transition
variable_led_effect_printing: "hydra_printing"       # Zone: tool actively printing
variable_led_effect_standby: "hydra_standby"         # Zone: tool parked, holding temp
variable_led_effect_preheating: "hydra_preheating"   # Zone: tool heating up
variable_led_effect_idle: ""                         # Zone: tool cold/inactive (blank = off)

# Legacy LED config (still works - called after zone update as a final override)
variable_led_toolchange_effect: "hydra_toolchange"
variable_led_printing_macro: ""                      # Set to macro name or "" to use zone system instead

# Calibration reference point for visual XY alignment
variable_cal_ref_x: 200.0        # Reference point X
variable_cal_ref_y: 200.0        # Reference point Y
variable_cal_ref_z: 5.0          # Reference point Z

# Runtime state (managed by macros - do not edit)
# Active tool is read from Klipper directly: printer["dual_carriage"].carriage_X
variable_t0_saved_x: 0.0         # Machine coordinates (offset-neutral)
variable_t0_saved_y: 0.0
variable_t0_saved_z: 0.0
variable_t1_saved_x: 0.0
variable_t1_saved_y: 0.0
variable_t1_saved_z: 0.0
variable_t0_retract_depth: 0     # How many mm retracted (0 = fully primed)
variable_t1_retract_depth: 0
variable_t0_saved_temp: 0        # Saved print temp before standby
variable_t1_saved_temp: 0
variable_t0_saved_fan: 0.0       # Saved fan speed before park
variable_t1_saved_fan: 0.0

gcode:
    # Config macro - no gcode, just variables
