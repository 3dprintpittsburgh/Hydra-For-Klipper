# Hydra for Klipper - IDEX Toolchange Macros
#
# Intelligent toolchange management with gcode lookahead support.
# Works with preprocessed gcode (NEXT_X/NEXT_Y provided) or
# raw gcode (falls back to saved positions).

[include hydra_variables.cfg]
[include hydra_calibration.cfg]
[include hydra_fan.cfg]
[include hydra_print.cfg]
[include hydra_leds.cfg]
[include hydra_wipe.cfg]


# =============================================================================
# Main entry point - called by preprocessed gcode or T0/T1 overrides
# =============================================================================
[gcode_macro IDEX_TOOL_CHANGE]
description: Hydra IDEX toolchange with optional lookahead positioning
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set new_tool = params.T|default(-1)|int %}
    {% set next_x = params.NEXT_X|default("")|string %}
    {% set next_y = params.NEXT_Y|default("")|string %}
    {% set has_next_pos = next_x != "" and next_y != "" %}

    # Get current active tool from Klipper directly
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}

    # Validate tool number
    {% if new_tool not in [0, 1] %}
        RESPOND TYPE=error MSG="Hydra: Invalid tool T{new_tool}"
    {% elif new_tool == current_tool %}
        # Already on this tool - just ensure extruder is synced
        {% if new_tool == 0 %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_GCODE_OFFSET X=0 Y=0 Z=0
        {% else %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
        {% endif %}
    {% else %}
        # LED: toolchange in progress
        _HYDRA_LED_GLOBAL STATE=toolchange

        # 1. Start preheating incoming nozzle (non-blocking)
        {% set incoming_temp = cfg.t0_saved_temp if new_tool == 0 else cfg.t1_saved_temp %}
        {% if incoming_temp > 0 %}
            {% if new_tool == 0 %}
                M104 T0 S{incoming_temp}
            {% else %}
                M104 T1 S{incoming_temp}
            {% endif %}
        {% endif %}

        # 2. Park outgoing tool (retract, Z hop, move to park, standby temp)
        _HYDRA_PARK TOOL={current_tool}

        # 3. Switch carriage, apply offsets, wait for temp
        _HYDRA_ACTIVATE TOOL={new_tool}

        # 4. Nozzle wipe/purge (if enabled and hot)
        {% if cfg.wipe_enabled %}
            NOZZLE_WIPE
        {% endif %}

        # 5. Move to position and drop Z
        {% if has_next_pos %}
            _HYDRA_POSITION TOOL={new_tool} NEXT_X={next_x} NEXT_Y={next_y}
        {% else %}
            _HYDRA_POSITION TOOL={new_tool}
        {% endif %}

        # LED: update zones
        _HYDRA_LED_UPDATE

        {% if cfg.led_printing_macro %}
            {cfg.led_printing_macro}
        {% endif %}
    {% endif %}


# =============================================================================
# Park the outgoing carriage
# =============================================================================
[gcode_macro _HYDRA_PARK]
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|int %}
    {% set pos = printer.gcode_move.gcode_position %}

    # Save current gcode position (offsets are handled by Klipper transparently)
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_x VALUE={pos.x}
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_y VALUE={pos.y}
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_z VALUE={pos.z}

    # Save and disable fan
    {% if tool == 0 %}
        {% set fan_speed = printer["output_pin " ~ cfg.fan_pin_t0].value|default(0) %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_fan VALUE={fan_speed}
        SET_PIN PIN={cfg.fan_pin_t0} VALUE=0
    {% else %}
        {% set fan_speed = printer["output_pin " ~ cfg.fan_pin_t1].value|default(0) %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_fan VALUE={fan_speed}
        SET_PIN PIN={cfg.fan_pin_t1} VALUE=0
    {% endif %}

    # Retract filament (only if hot enough)
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if nozzle_target > cfg.min_toolchange_temp %}
        M83
        G1 E-{cfg.retract_distance} F{cfg.retract_speed * 60}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_retract_depth VALUE={cfg.retract_distance}

        # Drop to standby temperature
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_temp VALUE={nozzle_target|int}
        {% set standby = (nozzle_target * cfg.standby_temp_factor)|int %}
        {% if tool == 0 %}
            M104 T0 S{standby}
        {% else %}
            M104 T1 S{standby}
        {% endif %}
    {% elif nozzle_target > 0 %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_temp VALUE={nozzle_target|int}
    {% endif %}

    # Z hop
    G91
    G1 Z{cfg.z_hop} F{cfg.z_hop_speed * 60}
    G90

    # Move to park position in machine coordinates
    {% set save_ox = printer.gcode_move.homing_origin.x|float %}
    {% set save_oy = printer.gcode_move.homing_origin.y|float %}
    {% set save_oz = printer.gcode_move.homing_origin.z|float %}
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    {% if tool == 0 %}
        G1 X{cfg.park_x_t0} F{cfg.travel_speed * 60}
    {% else %}
        G1 X{cfg.park_x_t1} F{cfg.travel_speed * 60}
    {% endif %}

    SET_GCODE_OFFSET X={save_ox} Y={save_oy} Z={save_oz}

    # LED: parked tool zone
    {% if nozzle_target > 0 %}
        _HYDRA_LED_TOOL TOOL={tool} STATE=standby
    {% else %}
        _HYDRA_LED_TOOL TOOL={tool} STATE=idle
    {% endif %}


# =============================================================================
# Activate incoming carriage - switch, apply offsets, wait for temp
# =============================================================================
[gcode_macro _HYDRA_ACTIVATE]
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|int %}

    # Switch carriage
    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE={tool}

    # Activate extruder and apply offsets
    {% if tool == 0 %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% else %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
    {% endif %}

    # Wait for temperature if nozzle has a target
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if nozzle_target >= cfg.min_toolchange_temp %}
        {% if tool == 0 %}
            TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={nozzle_target - cfg.temp_restore_delta}
        {% else %}
            TEMPERATURE_WAIT SENSOR="extruder1" MINIMUM={nozzle_target - cfg.temp_restore_delta}
        {% endif %}
    {% endif %}


# =============================================================================
# Position incoming tool - move XY, drop Z, extra prime, restore fan
# =============================================================================
[gcode_macro _HYDRA_POSITION]
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|int %}
    {% set next_x = params.NEXT_X|default("")|string %}
    {% set next_y = params.NEXT_Y|default("")|string %}
    {% set has_next_pos = next_x != "" and next_y != "" %}

    # Current gcode offsets (needed for collision clamp against machine-coord park positions)
    {% set ox = printer.gcode_move.homing_origin.x|float %}
    {% set oy = printer.gcode_move.homing_origin.y|float %}

    # Determine target position
    {% if has_next_pos %}
        # Preprocessor: gcode coordinates, use directly
        {% set target_x = next_x|float %}
        {% set target_y = next_y|float %}
    {% else %}
        # Priority: outgoing tool's last position (where printing was happening)
        # Fallback: this tool's own saved position
        # Last resort: bed center (manual/no saved positions)
        {% set other_tool = 1 if tool == 0 else 0 %}
        {% if other_tool == 0 %}
            {% set other_x = cfg.t0_saved_x %}
            {% set other_y = cfg.t0_saved_y %}
        {% else %}
            {% set other_x = cfg.t1_saved_x %}
            {% set other_y = cfg.t1_saved_y %}
        {% endif %}

        {% if tool == 0 %}
            {% set own_x = cfg.t0_saved_x %}
            {% set own_y = cfg.t0_saved_y %}
        {% else %}
            {% set own_x = cfg.t1_saved_x %}
            {% set own_y = cfg.t1_saved_y %}
        {% endif %}

        {% set is_printing = printer.print_stats.state == "printing" or printer.print_stats.state == "paused" %}

        {% if other_x != 0 or other_y != 0 %}
            # Go to outgoing tool's last position (where the print action was)
            {% set target_x = other_x %}
            {% set target_y = other_y %}
        {% elif own_x != 0 or own_y != 0 or is_printing %}
            # Fallback to own saved position
            {% set target_x = own_x %}
            {% set target_y = own_y %}
        {% else %}
            # No saved positions, not printing - bed center
            {% set target_x = 200 %}
            {% set target_y = 175 %}
        {% endif %}
    {% endif %}

    # Collision safety clamp (park positions are machine coords, target is gcode coords)
    # Convert gcode→machine for comparison: machine_x = gcode_x + offset
    {% set machine_x = target_x + ox %}
    {% set machine_y = target_y + oy %}
    {% set y_max = printer.configfile.config['stepper_y'].position_max|float %}
    {% set y_min = printer.configfile.config['stepper_y'].position_min|float %}

    {% if tool == 1 %}
        {% set min_x = cfg.park_x_t0 + cfg.safe_distance + 1 %}
        {% if machine_x < min_x %}
            {% set target_x = min_x - ox %}
        {% endif %}
    {% else %}
        {% set max_x = cfg.park_x_t1 - cfg.safe_distance - 1 %}
        {% if machine_x > max_x %}
            {% set target_x = max_x - ox %}
        {% endif %}
    {% endif %}

    {% if machine_y > y_max %}
        {% set target_y = y_max - oy - 1 %}
    {% elif machine_y < y_min %}
        {% set target_y = y_min - oy + 1 %}
    {% endif %}

    # Move XY at Z-hopped height
    G90
    G1 X{target_x} Y{target_y} F{cfg.travel_speed * 60}

    # Drop Z (undo park hop)
    G91
    G1 Z-{cfg.z_hop} F{cfg.z_hop_speed * 60}
    G90

    # Prime any remaining retract depth + extra prime at print position
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if nozzle_target >= cfg.min_toolchange_temp %}
        {% if tool == 0 %}
            {% set remaining_retract = cfg.t0_retract_depth %}
        {% else %}
            {% set remaining_retract = cfg.t1_retract_depth %}
        {% endif %}

        {% set total_prime = remaining_retract + cfg.extra_prime %}
        {% if total_prime > 0 %}
            M83
            G1 E{total_prime} F{cfg.prime_speed * 60}
            SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_retract_depth VALUE=0
        {% endif %}
    {% endif %}

    # Restore fan
    {% if tool == 0 %}
        {% set fan_speed = cfg.t0_saved_fan %}
        {% if fan_speed > 0 %}
            SET_PIN PIN={cfg.fan_pin_t0} VALUE={fan_speed}
        {% endif %}
    {% else %}
        {% set fan_speed = cfg.t1_saved_fan %}
        {% if fan_speed > 0 %}
            SET_PIN PIN={cfg.fan_pin_t1} VALUE={fan_speed}
        {% endif %}
    {% endif %}


# =============================================================================
# T0/T1 overrides
# =============================================================================
[gcode_macro T0]
gcode:
    IDEX_TOOL_CHANGE T=0

[gcode_macro T1]
gcode:
    IDEX_TOOL_CHANGE T=1


# =============================================================================
# Initialization
# =============================================================================
[gcode_macro HYDRA_INIT]
description: Initialize Hydra state after homing
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set initial_tool = params.TOOL|default(0)|int %}

    # Reset all runtime state
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_retract_depth VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_retract_depth VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_x VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_y VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_z VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_x VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_y VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_z VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_fan VALUE=0

    # Activate initial tool
    {% if initial_tool == 1 %}
        SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=1
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
    {% else %}
        SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% endif %}

    RESPOND MSG="Hydra initialized with T{initial_tool}"


# =============================================================================
# Status
# =============================================================================
[gcode_macro HYDRA_STATUS]
description: Display current Hydra state and configuration
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set current_tool = 1 if printer["dual_carriage"].carriage_1 == "PRIMARY" else 0 %}
    RESPOND MSG="============================================"
    RESPOND MSG="  Hydra IDEX Status"
    RESPOND MSG="============================================"
    RESPOND MSG="Active tool: T{current_tool}"
    RESPOND MSG=""
    RESPOND MSG="--- Tool State ---"
    RESPOND MSG="T0: pos=({'%.1f' % cfg.t0_saved_x}, {'%.1f' % cfg.t0_saved_y}, {'%.2f' % cfg.t0_saved_z}) retract_depth={cfg.t0_retract_depth}mm temp={cfg.t0_saved_temp} fan={'%.2f' % cfg.t0_saved_fan}"
    RESPOND MSG="T1: pos=({'%.1f' % cfg.t1_saved_x}, {'%.1f' % cfg.t1_saved_y}, {'%.2f' % cfg.t1_saved_z}) retract_depth={cfg.t1_retract_depth}mm temp={cfg.t1_saved_temp} fan={'%.2f' % cfg.t1_saved_fan}"
    RESPOND MSG=""
    RESPOND MSG="--- T1 Offsets ---"
    RESPOND MSG="X={cfg.offset_x_t1}  Y={cfg.offset_y_t1}  Z={cfg.offset_z_t1}"
    RESPOND MSG=""
    RESPOND MSG="--- Configuration ---"
    RESPOND MSG="Park: T0=X{cfg.park_x_t0}  T1=X{cfg.park_x_t1}  Y={cfg.park_y}"
    RESPOND MSG="Retract: {cfg.retract_distance}mm @ {cfg.retract_speed}mm/s"
    RESPOND MSG="Wipe retract: {cfg.wipe_retract}mm  Extra prime: {cfg.extra_prime}mm"
    RESPOND MSG="Z hop: {cfg.z_hop}mm  Travel: {cfg.travel_speed}mm/s"
    RESPOND MSG="Wipe: {'ON' if cfg.wipe_enabled else 'OFF'}  Purge: {cfg.wipe_purge_length}mm"
    RESPOND MSG="============================================"


# =============================================================================
# Reset
# =============================================================================
[gcode_macro HYDRA_RESET]
description: Reset all Hydra saved variables and runtime state
gcode:
    HYDRA_INIT TOOL=0

    SAVE_VARIABLE VARIABLE=hydra_offset_x_t1 VALUE=0
    SAVE_VARIABLE VARIABLE=hydra_offset_y_t1 VALUE=0
    SAVE_VARIABLE VARIABLE=hydra_offset_z_t1 VALUE=0

    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_x_t1 VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_y_t1 VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_z_t1 VALUE=0

    RESPOND MSG="Hydra: All state and saved offsets reset to defaults"
