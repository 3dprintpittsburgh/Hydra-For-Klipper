# Hydra for Klipper - IDEX Toolchange Macros
#
# Intelligent toolchange management with gcode lookahead support.
# Works with preprocessed gcode (NEXT_X/NEXT_Y provided) or
# raw gcode (falls back to saved positions).
#
# Features: fan management, LED effects, temperature standby/restore,
# collision avoidance, cold toolchange support.

[include hydra_variables.cfg]
[include hydra_calibration.cfg]
[include hydra_fan.cfg]
[include hydra_print.cfg]


# =============================================================================
# Main entry point - called by preprocessed gcode or T0/T1 overrides
# =============================================================================
[gcode_macro IDEX_TOOL_CHANGE]
description: Hydra IDEX toolchange with optional lookahead positioning
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set new_tool = params.T|default(-1)|int %}
    {% set next_x = params.NEXT_X|default("")|string %}
    {% set next_y = params.NEXT_Y|default("")|string %}
    {% set has_next_pos = next_x != "" and next_y != "" %}

    # Validate tool number
    {% if new_tool not in [0, 1] %}
        RESPOND TYPE=error MSG="Hydra: Invalid tool T{new_tool}"
    {% elif new_tool == cfg.active_tool %}
        # Already on this tool - just ensure extruder is synced
        {% if new_tool == 0 %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_GCODE_OFFSET X=0 Y=0 Z=0
        {% else %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
        {% endif %}
    {% else %}
        # LED: toolchange in progress
        {% if cfg.led_toolchange_effect %}
            SET_LED_EFFECT EFFECT={cfg.led_toolchange_effect}
        {% endif %}

        {% set old_tool = cfg.active_tool %}

        # Park outgoing tool (skip if no tool active yet)
        {% if old_tool >= 0 %}
            _HYDRA_PARK TOOL={old_tool}
        {% endif %}

        # Activate incoming tool
        {% if has_next_pos %}
            _HYDRA_RESTORE TOOL={new_tool} NEXT_X={next_x} NEXT_Y={next_y}
        {% else %}
            _HYDRA_RESTORE TOOL={new_tool}
        {% endif %}

        # Update active tool
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=active_tool VALUE={new_tool}

        # LED: back to printing
        {% if cfg.led_toolchange_effect %}
            STOP_LED_EFFECTS
        {% endif %}
        {% if cfg.led_printing_macro %}
            {cfg.led_printing_macro}
        {% endif %}
    {% endif %}


# =============================================================================
# Park the outgoing carriage
# =============================================================================
[gcode_macro _HYDRA_PARK]
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|int %}
    {% set pos = printer.gcode_move.gcode_position %}

    # Save current print position for this tool
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_x VALUE={pos.x}
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_y VALUE={pos.y}
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_z VALUE={pos.z}

    # Save and disable fan for this tool
    {% if tool == 0 %}
        {% set fan_speed = printer["output_pin " ~ cfg.fan_pin_t0].value|default(0) %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_fan VALUE={fan_speed}
        SET_PIN PIN={cfg.fan_pin_t0} VALUE=0
    {% else %}
        {% set fan_speed = printer["output_pin " ~ cfg.fan_pin_t1].value|default(0) %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_fan VALUE={fan_speed}
        SET_PIN PIN={cfg.fan_pin_t1} VALUE=0
    {% endif %}

    # Retract filament and set standby temp (only if hot)
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if nozzle_target > cfg.min_toolchange_temp %}
        M83
        G1 E-{cfg.retract_distance} F{cfg.retract_speed * 60}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_retracted VALUE=True

        # Save active temp and drop to standby
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_temp VALUE={nozzle_target|int}
        {% set standby = (nozzle_target * cfg.standby_temp_factor)|int %}
        {% if tool == 0 %}
            M104 T0 S{standby}
        {% else %}
            M104 T1 S{standby}
        {% endif %}
    {% elif nozzle_target > 0 %}
        # Warm but below min toolchange temp - just save temp
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_saved_temp VALUE={nozzle_target|int}
    {% endif %}

    # Z hop
    G91
    G1 Z{cfg.z_hop} F{cfg.z_hop_speed * 60}
    G90

    # Move to park position
    {% if tool == 0 %}
        G1 X{cfg.park_x_t0} F{cfg.travel_speed * 60}
    {% else %}
        G1 X{cfg.park_x_t1} F{cfg.travel_speed * 60}
    {% endif %}


# =============================================================================
# Activate and position incoming carriage
# =============================================================================
[gcode_macro _HYDRA_RESTORE]
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set tool = params.TOOL|int %}
    {% set next_x = params.NEXT_X|default("")|string %}
    {% set next_y = params.NEXT_Y|default("")|string %}
    {% set has_next_pos = next_x != "" and next_y != "" %}

    # Switch carriage
    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE={tool}

    # Activate extruder and apply offsets
    {% if tool == 0 %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% else %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
    {% endif %}

    # Restore temperature from standby
    {% set saved_temp = cfg.t0_saved_temp if tool == 0 else cfg.t1_saved_temp %}
    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if saved_temp > 0 and nozzle_target < saved_temp %}
        # Restore to saved print temperature
        {% if tool == 0 %}
            M104 T0 S{saved_temp}
        {% else %}
            M104 T1 S{saved_temp}
        {% endif %}
    {% endif %}

    # Determine target position
    {% if has_next_pos %}
        {% set target_x = next_x|float %}
        {% set target_y = next_y|float %}
    {% else %}
        {% if tool == 0 %}
            {% set target_x = cfg.t0_saved_x %}
            {% set target_y = cfg.t0_saved_y %}
        {% else %}
            {% set target_x = cfg.t1_saved_x %}
            {% set target_y = cfg.t1_saved_y %}
        {% endif %}
    {% endif %}

    # Collision safety - clamp X to safe distance from parked carriage
    {% set gcode_x_offset = printer.gcode_move.homing_origin.x|float %}
    {% set gcode_y_offset = printer.gcode_move.homing_origin.y|float %}
    {% set actual_x = target_x + gcode_x_offset %}
    {% set y_max = printer.configfile.config['stepper_y'].position_max|float %}
    {% set y_min = printer.configfile.config['stepper_y'].position_min|float %}

    {% if tool == 1 %}
        {% if actual_x < cfg.park_x_t0 + cfg.safe_distance %}
            {% set target_x = cfg.park_x_t0 + cfg.safe_distance - gcode_x_offset + 1 %}
        {% endif %}
    {% else %}
        {% if actual_x > cfg.park_x_t1 - cfg.safe_distance %}
            {% set target_x = cfg.park_x_t1 - cfg.safe_distance - gcode_x_offset - 1 %}
        {% endif %}
    {% endif %}

    # Clamp Y to axis limits (offsets can push past max)
    {% if target_y + gcode_y_offset > y_max %}
        {% set target_y = y_max - gcode_y_offset - 1 %}
    {% elif target_y + gcode_y_offset < y_min %}
        {% set target_y = y_min - gcode_y_offset + 1 %}
    {% endif %}

    # Wait for temperature before moving to print area
    {% if saved_temp > 0 %}
        {% set wait_temp = saved_temp - cfg.temp_restore_delta %}
        {% if tool == 0 %}
            TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={wait_temp}
        {% else %}
            TEMPERATURE_WAIT SENSOR="extruder1" MINIMUM={wait_temp}
        {% endif %}
    {% endif %}

    # Move to target XY (still at Z-hopped height)
    G1 X{target_x} Y{target_y} F{cfg.travel_speed * 60}

    # Drop Z back to print height
    G91
    G1 Z-{cfg.z_hop} F{cfg.z_hop_speed * 60}
    G90

    # Prime filament at print position (only if retracted and hot enough)
    {% if tool == 0 %}
        {% set is_retracted = cfg.t0_retracted %}
    {% else %}
        {% set is_retracted = cfg.t1_retracted %}
    {% endif %}

    {% set nozzle_target = printer[printer.toolhead.extruder].target|float %}
    {% if is_retracted and nozzle_target >= cfg.min_toolchange_temp %}
        M83
        G1 E{cfg.prime_distance} F{cfg.prime_speed * 60}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t{tool}_retracted VALUE=False
    {% endif %}

    # Restore fan speed for this tool
    {% if tool == 0 %}
        {% set fan_speed = cfg.t0_saved_fan %}
        {% if fan_speed > 0 %}
            SET_PIN PIN={cfg.fan_pin_t0} VALUE={fan_speed}
        {% endif %}
    {% else %}
        {% set fan_speed = cfg.t1_saved_fan %}
        {% if fan_speed > 0 %}
            SET_PIN PIN={cfg.fan_pin_t1} VALUE={fan_speed}
        {% endif %}
    {% endif %}


# =============================================================================
# T0/T1 overrides - for non-preprocessed gcode (slicer sends raw T0/T1)
# =============================================================================
[gcode_macro T0]
gcode:
    IDEX_TOOL_CHANGE T=0

[gcode_macro T1]
gcode:
    IDEX_TOOL_CHANGE T=1


# =============================================================================
# Initialization - call from PRINT_START or after G28
# =============================================================================
[gcode_macro HYDRA_INIT]
description: Initialize Hydra state after homing
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set initial_tool = params.TOOL|default(0)|int %}

    # Reset all runtime state
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=active_tool VALUE={initial_tool}
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_retracted VALUE=False
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_retracted VALUE=False
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_x VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_y VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_z VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_x VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_y VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_z VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t0_saved_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=t1_saved_fan VALUE=0

    # Activate initial tool
    {% if initial_tool == 1 %}
        SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=1
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={cfg.offset_x_t1} Y={cfg.offset_y_t1} Z={cfg.offset_z_t1}
    {% else %}
        SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
    {% endif %}

    RESPOND MSG="Hydra initialized with T{initial_tool}"


# =============================================================================
# Status / Debug
# =============================================================================
[gcode_macro HYDRA_STATUS]
description: Display current Hydra state
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    RESPOND MSG="============================================"
    RESPOND MSG="  Hydra IDEX Status"
    RESPOND MSG="============================================"
    RESPOND MSG="Active tool: T{cfg.active_tool}"
    RESPOND MSG="T0: X{'%.1f' % cfg.t0_saved_x} Y{'%.1f' % cfg.t0_saved_y} Z{'%.2f' % cfg.t0_saved_z} ret={cfg.t0_retracted} temp={cfg.t0_saved_temp} fan={'%.1f' % cfg.t0_saved_fan}"
    RESPOND MSG="T1: X{'%.1f' % cfg.t1_saved_x} Y{'%.1f' % cfg.t1_saved_y} Z{'%.2f' % cfg.t1_saved_z} ret={cfg.t1_retracted} temp={cfg.t1_saved_temp} fan={'%.1f' % cfg.t1_saved_fan}"
    RESPOND MSG="T1 offsets: X{cfg.offset_x_t1} Y{cfg.offset_y_t1} Z{cfg.offset_z_t1}"
    RESPOND MSG="============================================"
