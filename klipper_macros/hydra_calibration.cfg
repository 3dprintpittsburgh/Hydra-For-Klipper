# Hydra for Klipper - IDEX Calibration Macros
#
# Z-offset calibration, XY visual alignment, XY print test,
# and offset persistence.


# =============================================================================
# Z-Offset Calibration (paper test using MANUAL_PROBE)
# =============================================================================
[gcode_macro CALIBRATE_IDEX_Z_OFFSET]
description: Calibrate T1 nozzle Z offset using paper test
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Ensure T0 is active with no offsets
    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    # Park T0 at minimum to clear way for T1
    G90
    G1 X{printer.configfile.config['stepper_x'].position_min} F12000

    # Switch to T1 raw (no offset)
    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    # Move to bed center
    G90
    G1 Z10 F600
    G1 X200 Y200 F6000

    RESPOND MSG="============================================"
    RESPOND MSG="  Hydra: T1 Z-OFFSET CALIBRATION"
    RESPOND MSG="============================================"
    RESPOND MSG="T1 active with NO offset applied."
    RESPOND MSG="Paper-test T1, hit ACCEPT when done."
    RESPOND MSG="Offset saves automatically."
    RESPOND MSG="============================================"

    SET_GCODE_VARIABLE MACRO=SAVE_IDEX_Z_OFFSET VARIABLE=awaiting_save VALUE=True
    MANUAL_PROBE
    UPDATE_DELAYED_GCODE ID=_HYDRA_Z_CAL_WATCHER DURATION=1


[gcode_macro SAVE_IDEX_Z_OFFSET]
description: Save T1 Z offset after paper test ACCEPT
variable_awaiting_save: False
gcode:
    {% set accepted_z = printer.gcode_move.gcode_position.z %}
    {% set t1_offset = accepted_z|round(3) %}

    {% if accepted_z|abs > 3.0 %}
        RESPOND TYPE=error MSG="Z={accepted_z}mm seems too large. Re-run calibration."
    {% else %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_z_t1 VALUE={t1_offset}
        SAVE_VARIABLE VARIABLE=hydra_offset_z_t1 VALUE={t1_offset}

        RESPOND MSG="Hydra: T1 Z offset saved: {'%.3f' % t1_offset}mm"

        # Return to T0
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G90
        G1 Z10 F600
    {% endif %}


[delayed_gcode _HYDRA_Z_CAL_WATCHER]
gcode:
    {% if printer["gcode_macro SAVE_IDEX_Z_OFFSET"].awaiting_save %}
        {% if printer.manual_probe.is_active %}
            UPDATE_DELAYED_GCODE ID=_HYDRA_Z_CAL_WATCHER DURATION=1
        {% else %}
            SET_GCODE_VARIABLE MACRO=SAVE_IDEX_Z_OFFSET VARIABLE=awaiting_save VALUE=False
            SAVE_IDEX_Z_OFFSET
        {% endif %}
    {% endif %}


# =============================================================================
# XY Visual Alignment (Phase 1: eyeball with live nudge)
# =============================================================================
[gcode_macro CALIBRATE_IDEX_XY_VISUAL]
description: Eyeball-align T1 over a reference point
variable_nudge_x: 0.0
variable_nudge_y: 0.0
variable_active: False
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Move T0 to reference point
    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    G90
    G1 Z{cfg.cal_ref_z + 5} F600
    G1 X{cfg.cal_ref_x} Y{cfg.cal_ref_y} F6000
    G1 Z{cfg.cal_ref_z} F600

    RESPOND MSG="============================================"
    RESPOND MSG="  Hydra: XY Visual Alignment - Phase 1a"
    RESPOND MSG="============================================"
    RESPOND MSG="T0 is over reference ({cfg.cal_ref_x}, {cfg.cal_ref_y})."
    RESPOND MSG="Verify, then run IDEX_VISUAL_SWITCH"
    RESPOND MSG="============================================"


[gcode_macro IDEX_VISUAL_SWITCH]
description: Switch to T1 for visual alignment nudging
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}

    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    G90
    G1 X{printer.configfile.config['stepper_x'].position_min} F12000

    SET_DUAL_CARRIAGE MODE=PRIMARY CARRIAGE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0

    G90
    G1 Z{cfg.cal_ref_z + 5} F600
    G1 X{cfg.cal_ref_x} Y{cfg.cal_ref_y} F6000
    G1 Z{cfg.cal_ref_z} F600

    SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=nudge_x VALUE=0
    SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=nudge_y VALUE=0
    SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=active VALUE=True

    RESPOND MSG="T1 at reference. Use IDEX_VISUAL_NUDGE to align."


[gcode_macro IDEX_VISUAL_NUDGE]
description: Nudge T1 during visual XY calibration
gcode:
    {% set cal = printer["gcode_macro CALIBRATE_IDEX_XY_VISUAL"] %}
    {% set axis = params.AXIS|default("X")|upper %}
    {% set dist = params.DIST|default(0.1)|float %}

    {% if cal.active %}
        G91
        {% if axis == "X" %}
            {% set new_x = cal.nudge_x + dist %}
            G1 X{dist} F3000
            SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=nudge_x VALUE={new_x}
            RESPOND MSG="Nudge: X={'%.3f' % new_x} Y={'%.3f' % cal.nudge_y}"
        {% elif axis == "Y" %}
            {% set new_y = cal.nudge_y + dist %}
            G1 Y{dist} F3000
            SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=nudge_y VALUE={new_y}
            RESPOND MSG="Nudge: X={'%.3f' % cal.nudge_x} Y={'%.3f' % new_y}"
        {% endif %}
        G90
    {% else %}
        RESPOND TYPE=error MSG="Run CALIBRATE_IDEX_XY_VISUAL first."
    {% endif %}


[gcode_macro SAVE_IDEX_XY_VISUAL]
description: Save XY offsets from visual calibration
gcode:
    {% set cal = printer["gcode_macro CALIBRATE_IDEX_XY_VISUAL"] %}

    {% if cal.active %}
        {% set x_off = cal.nudge_x|round(3) %}
        {% set y_off = cal.nudge_y|round(3) %}

        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_x_t1 VALUE={x_off}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_y_t1 VALUE={y_off}
        SAVE_VARIABLE VARIABLE=hydra_offset_x_t1 VALUE={x_off}
        SAVE_VARIABLE VARIABLE=hydra_offset_y_t1 VALUE={y_off}

        SET_GCODE_VARIABLE MACRO=CALIBRATE_IDEX_XY_VISUAL VARIABLE=active VALUE=False

        RESPOND MSG="Hydra: XY offsets saved X={x_off} Y={y_off}"

        # Return to T0
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G90
        G1 Z10 F600
    {% else %}
        RESPOND TYPE=error MSG="No visual calibration in progress."
    {% endif %}


# =============================================================================
# XY Print Test (Phase 2: concentric squares for caliper measurement)
# =============================================================================
[gcode_macro CALIBRATE_IDEX_XY_ALIGNMENT]
description: Print alternating T0/T1 squares for XY alignment. Params: BED_TEMP, NOZZLE_TEMP, NOZZLE_TEMP_T1
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set NOZZLE_TEMP = params.NOZZLE_TEMP|default(200)|float %}
    {% set NOZZLE_TEMP_T1 = params.NOZZLE_TEMP_T1|default(NOZZLE_TEMP)|float %}

    {% set h = 0.2 %}
    {% set w = 0.8 %}
    {% set D = 1.75 %}
    {% set A = (3.14159 * (D/2) * (D/2)) %}

    M104 T0 S{NOZZLE_TEMP}
    M104 T1 S{NOZZLE_TEMP_T1}

    {% if not printer.toolhead.homed_axes|lower in ['xyz', 'xy'] %}
        G28
    {% endif %}

    M140 S{BED_TEMP}
    RESPOND MSG="Hydra: Waiting for temperatures..."
    M109 S{NOZZLE_TEMP} T0
    M109 S{NOZZLE_TEMP_T1} T1
    TEMPERATURE_WAIT SENSOR="heater_bed" MINIMUM="{BED_TEMP - 3}"

    T0
    G90
    G92 E0
    M83

    # Purge T0
    G1 X200 Y200 Z0.2 F12000
    G1 E10 F600
    G1 E-2 F2000

    # Extrusion lengths per side
    {% set e_10 = (h * w * 10) / A %}
    {% set e_15 = (h * w * 15) / A %}
    {% set e_20 = (h * w * 20) / A %}
    {% set e_25 = (h * w * 25) / A %}
    {% set e_30 = (h * w * 30) / A %}
    {% set e_35 = (h * w * 35) / A %}
    {% set e_40 = (h * w * 40) / A %}
    {% set e_50 = (h * w * 50) / A %}
    {% set e_60 = (h * w * 60) / A %}

    # Square 1: T1 - 10mm
    T1
    M83
    G1 X195 Y195 Z0.2 F6000
    G1 E2 F2000
    G1 X195 Y205 E{e_10|float} F2000
    G1 X205 Y205 E{e_10|float} F2000
    G1 X205 Y195 E{e_10|float} F2000
    G1 X195 Y195 E{e_10|float} F2000
    G1 E-2 F2000

    # Square 2: T0 - 15mm
    T0
    M83
    G1 X192.5 Y192.5 Z0.2 F6000
    G1 E2 F2000
    G1 X192.5 Y207.5 E{e_15|float} F2000
    G1 X207.5 Y207.5 E{e_15|float} F2000
    G1 X207.5 Y192.5 E{e_15|float} F2000
    G1 X192.5 Y192.5 E{e_15|float} F2000
    G1 E-2 F2000

    # Square 3: T1 - 20mm
    T1
    M83
    G1 X190 Y190 Z0.2 F6000
    G1 E2 F2000
    G1 X190 Y210 E{e_20|float} F2000
    G1 X210 Y210 E{e_20|float} F2000
    G1 X210 Y190 E{e_20|float} F2000
    G1 X190 Y190 E{e_20|float} F2000
    G1 E-2 F2000

    # Square 4: T0 - 25mm
    T0
    M83
    G1 X187.5 Y187.5 Z0.2 F6000
    G1 E2 F2000
    G1 X187.5 Y212.5 E{e_25|float} F2000
    G1 X212.5 Y212.5 E{e_25|float} F2000
    G1 X212.5 Y187.5 E{e_25|float} F2000
    G1 X187.5 Y187.5 E{e_25|float} F2000
    G1 E-2 F2000

    # Square 5: T1 - 30mm
    T1
    M83
    G1 X185 Y185 Z0.2 F6000
    G1 E2 F2000
    G1 X185 Y215 E{e_30|float} F2000
    G1 X215 Y215 E{e_30|float} F2000
    G1 X215 Y185 E{e_30|float} F2000
    G1 X185 Y185 E{e_30|float} F2000
    G1 E-2 F2000

    # Square 6: T0 - 35mm
    T0
    M83
    G1 X182.5 Y182.5 Z0.2 F6000
    G1 E2 F2000
    G1 X182.5 Y217.5 E{e_35|float} F2000
    G1 X217.5 Y217.5 E{e_35|float} F2000
    G1 X217.5 Y182.5 E{e_35|float} F2000
    G1 X182.5 Y182.5 E{e_35|float} F2000
    G1 E-2 F2000

    # Square 7: T1 - 40mm
    T1
    M83
    G1 X180 Y180 Z0.2 F6000
    G1 E2 F2000
    G1 X180 Y220 E{e_40|float} F2000
    G1 X220 Y220 E{e_40|float} F2000
    G1 X220 Y180 E{e_40|float} F2000
    G1 X180 Y180 E{e_40|float} F2000
    G1 E-2 F2000

    # Square 8: T0 - 50mm
    T0
    M83
    G1 X175 Y175 Z0.2 F6000
    G1 E2 F2000
    G1 X175 Y225 E{e_50|float} F2000
    G1 X225 Y225 E{e_50|float} F2000
    G1 X225 Y175 E{e_50|float} F2000
    G1 X175 Y175 E{e_50|float} F2000
    G1 E-2 F2000

    # Square 9: T1 - 60mm
    T1
    M83
    G1 X170 Y170 Z0.2 F6000
    G1 E2 F2000
    G1 X170 Y230 E{e_60|float} F2000
    G1 X230 Y230 E{e_60|float} F2000
    G1 X230 Y170 E{e_60|float} F2000
    G1 X170 Y170 E{e_60|float} F2000
    G1 E-2 F2000

    # Finish - park and present bed
    G1 Z10 F1200
    T0
    G1 X{printer.configfile.config['stepper_x'].position_min} Y{printer.configfile.config['stepper_y'].position_max} F12000


# =============================================================================
# Show offsets
# =============================================================================
[gcode_macro SAVE_IDEX_Y_OFFSET]
description: Save T1 Y offset (used by KlipperScreen alignment panel)
gcode:
    {% set offset = params.OFFSET|default(0)|float %}

    SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_y_t1 VALUE={offset}
    SAVE_VARIABLE VARIABLE=hydra_offset_y_t1 VALUE={offset}
    RESPOND MSG="Hydra: T1 Y offset saved: {offset}mm"


[gcode_macro SHOW_IDEX_OFFSETS]
description: Display current T1 offsets
gcode:
    {% set cfg = printer["gcode_macro _HYDRA_CONFIG"] %}
    {% set sv = printer.save_variables.variables %}
    RESPOND MSG="============================================"
    RESPOND MSG="  Hydra: T1 Offsets"
    RESPOND MSG="============================================"
    RESPOND MSG="Active:  X={cfg.offset_x_t1}  Y={cfg.offset_y_t1}  Z={cfg.offset_z_t1}"
    RESPOND MSG="Saved:   X={sv.hydra_offset_x_t1|default('--')}  Y={sv.hydra_offset_y_t1|default('--')}  Z={sv.hydra_offset_z_t1|default('--')}"
    RESPOND MSG="============================================"


# =============================================================================
# Load saved offsets on startup
# =============================================================================
[delayed_gcode _HYDRA_LOAD_OFFSETS]
initial_duration: 2
gcode:
    {% set sv = printer.save_variables.variables %}
    {% if sv.hydra_offset_x_t1 is defined %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_x_t1 VALUE={sv.hydra_offset_x_t1}
        RESPOND MSG="Hydra: Loaded X offset: {sv.hydra_offset_x_t1}mm"
    {% endif %}
    {% if sv.hydra_offset_y_t1 is defined %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_y_t1 VALUE={sv.hydra_offset_y_t1}
        RESPOND MSG="Hydra: Loaded Y offset: {sv.hydra_offset_y_t1}mm"
    {% endif %}
    {% if sv.hydra_offset_z_t1 is defined %}
        SET_GCODE_VARIABLE MACRO=_HYDRA_CONFIG VARIABLE=offset_z_t1 VALUE={sv.hydra_offset_z_t1}
        RESPOND MSG="Hydra: Loaded Z offset: {sv.hydra_offset_z_t1}mm"
    {% endif %}
